<body class="bg-[#050810]">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const Icon = ({ d, size=24, className='', fill='none', children }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className={className}> {d && <path d={d}/>} {children} </svg> );
const Search = ({size,className}) => <Icon size={size} className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></Icon>;
const ShieldCheck = ({size,className}) => <Icon size={size} className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></Icon>;
const User = ({size,className}) => <Icon size={size} className={className}><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></Icon>;
const HistoryIcon = ({size,className}) => <Icon size={size} className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
const Plus = ({size,className}) => <Icon size={size} className={className}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
const Trash2 = ({size,className}) => <Icon size={size} className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></Icon>;
const Star = ({size,className,fill}) => <svg xmlns="http://www.w3.org/2000/svg" width={size||24} height={size||24} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
const Trophy = ({size,className}) => <Icon size={size} className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></Icon>;
const ChevronRight = ({size,className}) => <Icon size={size} className={className} d="m9 18 6-6-6-6"/>;
const Info = ({size,className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
const MapIcon = ({size,className}) => <Icon size={size} className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></Icon>;
const LayoutGrid = ({size,className}) => <Icon size={size} className={className}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></Icon>;
const Filter = ({size,className}) => <Icon size={size} className={className} d="M22 3H2l8 9.46V19l4 2v-8.54L22 3"/>;
const ChevronDown = ({size,className}) => <Icon size={size} className={className} d="m6 9 6 6 6-6"/>;
const ChevronUp = ({size,className}) => <Icon size={size} className={className} d="m18 15-6-6-6 6"/>;
const SettingsIcon = ({size,className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
const XIcon = ({size,className}) => <Icon size={size} className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
const EditIcon = ({size,className}) => <Icon size={size} className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
const Gem = ({size,className}) => <Icon size={size} className={className}><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></Icon>;

const WINGS = {
  LOWER:  { id:"LOWER",  name:"城塞大門",    color:"blue"   },
  PLAGUE: { id:"PLAGUE", name:"瘟疫工坊",    color:"green"  },
  CRIMSON:{ id:"CRIMSON",name:"赤紅大廳",    color:"red"    },
  FROST:  { id:"FROST",  name:"霜翼大廳",    color:"cyan"   },
  THRONE: { id:"THRONE", name:"寒冰皇冠尖塔",color:"purple" }
};

const App = () => {
  const [user, setUser] = useState(null);
  const [userRole, setUserRole] = useState('guest'); 
  const [userDisplayName, setUserDisplayName] = useState(''); 
  
  const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
  const [authForm, setAuthForm] = useState({ email: '', password: '', gameId: '', isLogin: true });

  const [activeTab, setActiveTab] = useState('query');
  const [adminTab, setAdminTab] = useState('users'); 
  const [searchTerm, setSearchTerm] = useState('');
  const [wishSearchTerm, setWishSearchTerm] = useState('');
  
  // 新增：分配歷史的篩選狀態
  const [historyFilter, setHistoryFilter] = useState({ date: '', person: '', boss: '', item: '' });
  
  const [records, setRecords] = useState([]);
  const [wishlists, setWishlists] = useState([]);
  const [allUsers, setAllUsers] = useState([]); 
  const [systemLogs, setSystemLogs] = useState([]);
  const [logFilter, setLogFilter] = useState('ALL');
  
  const [selectedWing, setSelectedWing] = useState(null);
  const [isSettingsOpen, setIsSettingsOpen] = useState(false);
  const [uiScale, setUiScale] = useState(() => localStorage.getItem('icc_uiScale') || '16px');
  const [prioMode, setPrioMode] = useState(() => localStorage.getItem('icc_prioMode') || 'tags');

  const [dropForm, setDropForm] = useState({ boss: ICC_DATA[0].boss, item:'', winner:'', points:'' });
  const [wishForm, setWishForm] = useState({ w1Boss:'', w1Item:'', w2Boss:'', w2Item:'' });

  const writeLog = async (actionType, details) => {
    if (!window.fb.auth.currentUser) return;
    try {
      await window.fb.addDoc(window.fb.collection(window.fb.db, 'logs'), {
        type: actionType,
        details: details,
        userEmail: window.fb.auth.currentUser.email,
        timestamp: Date.now(),
        date: new Date().toLocaleString()
      });
    } catch(e) { console.error("Log error", e); }
  };

  // 檢查遊戲 ID 是否已被使用
  const isIdTaken = async (newId, excludeUid = null) => {
    if (!window.fb.where) return false;
    const q = window.fb.query(window.fb.collection(window.fb.db, 'users'), window.fb.where('displayName', '==', newId));
    const snap = await window.fb.getDocs(q);
    
    if (snap.empty) return false;
    
    let taken = false;
    snap.forEach(doc => {
      // 如果找到的 ID 剛好是自己目前的 UID，就不算重複
      if (doc.id !== excludeUid) taken = true;
    });
    return taken;
  };

  useEffect(() => {
    const initFirebase = () => {
      window.fb.onAuthStateChanged(window.fb.auth, async (currentUser) => {
        if (currentUser) {
          setUser(currentUser);
          const userDocRef = window.fb.doc(window.fb.db, 'users', currentUser.uid);
          const userDoc = await window.fb.getDoc(userDocRef);
          
          if (userDoc.exists()) {
            setUserRole(userDoc.data().role);
            setUserDisplayName(userDoc.data().displayName);
          }
        } else {
          setUser(null);
          setUserRole('guest');
          setUserDisplayName('');
        }
      });

      window.fb.onSnapshot(window.fb.collection(window.fb.db, 'records'), (snapshot) => {
        setRecords(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => b.timestamp - a.timestamp));
      });
      window.fb.onSnapshot(window.fb.collection(window.fb.db, 'wishlists'), (snapshot) => {
        setWishlists(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
      });
      window.fb.onSnapshot(window.fb.collection(window.fb.db, 'users'), (snapshot) => {
        setAllUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
      });
    };

    if (window.fb) initFirebase();
    else window.addEventListener('firebase-ready', initFirebase);
    return () => window.removeEventListener('firebase-ready', initFirebase);
  }, []);

  useEffect(() => {
    if (userRole !== 'admin' || !window.fb) return;
    const logsQuery = window.fb.query(window.fb.collection(window.fb.db, 'logs'), window.fb.orderBy('timestamp', 'desc'));
    const unsubscribeLogs = window.fb.onSnapshot(logsQuery, (snapshot) => {
      setSystemLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
    });
    return () => unsubscribeLogs();
  }, [userRole]);

  useEffect(() => {
    localStorage.setItem('icc_uiScale', uiScale);
    document.documentElement.style.fontSize = uiScale;
    localStorage.setItem('icc_prioMode', prioMode);
  }, [uiScale, prioMode]);

  const handleAuth = async (e) => {
    e.preventDefault();
    try {
      if (authForm.isLogin) {
        await window.fb.signInWithEmailAndPassword(window.fb.auth, authForm.email, authForm.password);
      } else {
        const newGameId = authForm.gameId.trim();
        if (!newGameId) return alert("請輸入遊戲角色 ID！");
        
        // 檢查 ID 是否重複
        const taken = await isIdTaken(newGameId);
        if (taken) return alert("此遊戲 ID 已被使用，請換一個！");

        const userCred = await window.fb.createUserWithEmailAndPassword(window.fb.auth, authForm.email, authForm.password);
        
        await window.fb.setDoc(window.fb.doc(window.fb.db, 'users', userCred.user.uid), {
          email: userCred.user.email,
          role: 'user',
          displayName: newGameId,
          prPoints: 0
        });
        writeLog('AUTH', `新帳號註冊，遊戲ID: ${newGameId}`);
      }
      setIsAuthModalOpen(false);
      setAuthForm({ email: '', password: '', gameId: '', isLogin: true });
    } catch (error) {
      alert("發生錯誤：" + error.message);
    }
  };
  // === 處理忘記密碼 ===
  const handleResetPassword = async () => {
    if (!authForm.email) {
      alert("請先在上方輸入您的信箱 (Email)，再點擊「忘記密碼」。");
      return;
    }
    try {
      await window.fb.sendPasswordResetEmail(window.fb.auth, authForm.email);
      alert("密碼重設信件已發送！\n請前往您的信箱收信，並點擊信中連結重設密碼。");
      writeLog('AUTH', `發送了密碼重設信件至: ${authForm.email}`);
    } catch (error) {
      alert("發送失敗，請確認信箱格式是否正確，或該帳號是否存在。\n錯誤訊息：" + error.message);
    }
  };

  const handleLogout = async () => {
    
    window.fb.signOut(window.fb.auth);
  };

  const changeMyGameId = async () => {
    const newId = prompt("請輸入新的遊戲角色 ID：", userDisplayName);
    if (newId && newId.trim() !== "" && newId !== userDisplayName) {
      const trimmedId = newId.trim();

      // 檢查是否撞名，排除自己原本的 UID
      const taken = await isIdTaken(trimmedId, user.uid);
      if (taken) return alert("此遊戲 ID 已被使用，請換一個！");

      // 1. 更新 Users 集合
      await window.fb.updateDoc(window.fb.doc(window.fb.db, 'users', user.uid), { displayName: trimmedId });

      // 2. 同步更新 Wishlists 集合
      const myWishlist = wishlists.find(w => w.userId === user.uid);
      if (myWishlist) {
        await window.fb.updateDoc(window.fb.doc(window.fb.db, 'wishlists', myWishlist.id), { name: trimmedId });
      }

      writeLog('USER', `更改遊戲 ID 為: ${trimmedId}`);
      setUserDisplayName(trimmedId);
      alert("遊戲 ID 更新成功！");
    }
  };

  const adjustPoints = async (uid, currentPoints, delta, userName) => {
    if (userRole !== 'admin' && userRole !== 'leader') return;
    const newPoints = (currentPoints || 0) + delta;
    await window.fb.updateDoc(window.fb.doc(window.fb.db, 'users', uid), { prPoints: newPoints });
    writeLog('USER', `手動調整 ${userName} 優先點數為 ${newPoints} (變動: ${delta > 0 ? '+'+delta : delta})`);
  };

  const addRecord = async () => {
    if (!dropForm.item || !dropForm.winner || !dropForm.points) return;
    
    // 1. 檢查這位贏家是否有這件裝備的怨念
    const wisherRecord = wishlists.find(w => 
      w.name === dropForm.winner && w.items.includes(dropForm.item)
    );
    const isWishMatch = !!wisherRecord;

    // 2. 準備分配紀錄資料 (標記是否為怨念)
    const recordData = {
      ...dropForm,
      isWish: isWishMatch, // 新增標記
      date: new Date().toLocaleString(),
      timestamp: Date.now(),
      recordedBy: user.email
    };

    try {
      // 3. 寫入分配紀錄
      await window.fb.addDoc(window.fb.collection(window.fb.db, 'records'), recordData);

      // 4. 如果是怨念裝，執行自動刪除邏輯
      if (isWishMatch) {
        const updatedItems = wisherRecord.items.filter(it => it !== dropForm.item);
        
        if (updatedItems.length === 0) {
          // 如果刪除後沒裝備了，直接刪除該文件
          await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'wishlists', wisherRecord.id));
        } else {
          // 否則只更新裝備清單
          await window.fb.updateDoc(window.fb.doc(window.fb.db, 'wishlists', wisherRecord.id), {
            items: updatedItems
          });
        }
        
        // Log 紀錄標記為怨念達成
        writeLog('WISH', `怨念達成！自動移除 ${dropForm.winner} 的 [${dropForm.item}] 申請`);
      }

      writeLog('RECORD', `分配裝備 [${dropForm.item}] 給 ${dropForm.winner}${isWishMatch ? ' (★怨念裝)' : ''}，點數: ${dropForm.points}`);
      
      setDropForm({ ...dropForm, item:'', winner:'', points:'' });
      alert(isWishMatch ? "分配成功！已自動移除該員的怨念裝申請。" : "掉落已登記！");
      
    } catch (e) {
      console.error("Record Error:", e);
      alert("登記失敗，請檢查網路或權限");
    }
  };

  const addWish = async () => {
    if (!userDisplayName) return alert("您的帳號尚未設定遊戲 ID，無法登記！");
    const items = [wishForm.w1Item, wishForm.w2Item].filter(i => i !== '');
    const existingDoc = wishlists.find(w => w.name === userDisplayName);
    
    if (existingDoc) {
      if (existingDoc.userId !== user.uid && userRole === 'user') return alert("您只能修改自己的怨念清單！");
      await window.fb.updateDoc(window.fb.doc(window.fb.db, 'wishlists', existingDoc.id), { items });
      writeLog('WISH', `更新了怨念裝清單`);
    } else {
      await window.fb.addDoc(window.fb.collection(window.fb.db, 'wishlists'), {
        name: userDisplayName,
        items,
        userId: user.uid
      });
      writeLog('WISH', `新增了怨念裝清單`);
    }
    setWishForm({ w1Boss:'', w1Item:'', w2Boss:'', w2Item:'' });
    alert("怨念清單已成功同步！");
  };

  const deleteRecord = async (id, item) => {
    if(confirm(`確定要刪除這筆 [${item}] 的分配紀錄嗎？`)) {
      await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'records', id));
      writeLog('RECORD', `刪除了一筆 [${item}] 的分配紀錄`);
    }
  };

  const deleteWishlist = async (id, name) => {
    if(confirm(`確定要刪除 [${name}] 的怨念清單嗎？`)) {
      await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'wishlists', id));
      writeLog('WISH', `刪除了 [${name}] 的怨念清單`);
    }
  };
  
  const adminUpdateUser = async (uid, field, value, userEmail) => {
    if (field === 'displayName') {
      const trimmedId = value.trim();
      if (!trimmedId) return alert("遊戲 ID 不能為空！");

      // 檢查是否撞名，排除正在修改的該玩家 UID
      const taken = await isIdTaken(trimmedId, uid);
      if (taken) {
        alert("此遊戲 ID 已被其他玩家使用！");
        return; // 取消寫入
      }

      // 1. 更新 Users 集合
      await window.fb.updateDoc(window.fb.doc(window.fb.db, 'users', uid), { [field]: trimmedId });

      // 2. 同步更新 Wishlists 集合
      const userWishlist = wishlists.find(w => w.userId === uid);
      if (userWishlist) {
        await window.fb.updateDoc(window.fb.doc(window.fb.db, 'wishlists', userWishlist.id), { name: trimmedId });
      }
      writeLog('ADMIN', `管理員修改了帳號 (${userEmail}) 的遊戲 ID 為: ${trimmedId}`);
    } else {
      await window.fb.updateDoc(window.fb.doc(window.fb.db, 'users', uid), { [field]: value });
      writeLog('ADMIN', `管理員修改了帳號 (${userEmail}) 的 ${field} 為: ${value}`);
    }
  };

  const groupedData = useMemo(() => {
    const groups = {};
    ICC_DATA.forEach(entry => {
      const filteredItems = entry.items.filter(i => i.name.includes(searchTerm) || entry.boss.includes(searchTerm));
      if (filteredItems.length > 0) {
        if (!groups[entry.wing]) groups[entry.wing] = [];
        groups[entry.wing].push({ ...entry, items: filteredItems });
      }
    });
    return groups;
  }, [searchTerm]);

  const getWishers = (itemName) => wishlists.filter(w => w.items.includes(itemName)).map(w => w.name);
  const getItemsByBoss = (bossName) => ICC_DATA.find(b => b.boss === bossName)?.items || [];
  const getBossByItem = (itemName) => {
    const entry = ICC_DATA.find(b => b.items.some(i => i.name === itemName));
    return entry ? entry.boss : '未知';
  };
  const isConflict = (itemName) => getWishers(itemName).length > 1;

  // 用於過濾歷史紀錄的陣列
  const filteredRecords = records.filter(r => {
    const matchDate = r.date.includes(historyFilter.date);
    const matchPerson = r.winner.toLowerCase().includes(historyFilter.person.toLowerCase());
    const matchBoss = historyFilter.boss ? r.boss === historyFilter.boss : true;
    const matchItem = historyFilter.item ? r.item === historyFilter.item : true;
    return matchDate && matchPerson && matchBoss && matchItem;
  });

  const renderPriorities = (item) => {
    if (!item) return null;
    if (prioMode === 'tags') {
      return (
        <div className="flex flex-wrap gap-1.5 mt-2">
          {Object.entries(item.priorities).sort((a,b)=>a[1]-b[1]).map(([spec,prio]) => (
            <span key={spec} className={`text-[10px] px-2.5 py-1 rounded-lg font-black border ${prio===1 ? 'bg-blue-600/20 border-blue-500/30 text-blue-300' : prio===2 ? 'bg-slate-800 border-slate-700 text-slate-300' : 'bg-slate-900 border-slate-800 text-slate-500'}`}>{spec}: {prio}</span>
          ))}
        </div>
      );
    } else {
      const grouped = Object.entries(item.priorities).reduce((acc, [spec, prio]) => {
        if (!acc[prio]) acc[prio] = []; acc[prio].push(spec); return acc;
      }, {});
      return (
        <div className="space-y-2 mt-3">
          {Object.entries(grouped).sort((a,b)=>a[0]-b[0]).map(([prio, specs]) => (
            <div key={prio} className={`flex items-stretch gap-3 text-xs rounded-xl border overflow-hidden shadow-sm ${prio==='1' ? 'bg-blue-900/30 border-blue-500/50' : prio==='2' ? 'bg-slate-800/80 border-slate-600' : 'bg-slate-900 border-slate-800'}`}>
              <div className={`flex items-center justify-center px-3 font-black ${prio==='1' ? 'bg-blue-500 text-white' : prio==='2' ? 'bg-slate-700 text-slate-200' : 'bg-slate-800 text-slate-400'}`}>T{prio}</div>
              <div className={`flex-1 py-2 pr-2 font-bold tracking-wide leading-relaxed ${prio==='1' ? 'text-blue-200' : prio==='2' ? 'text-slate-300' : 'text-slate-500'}`}>{specs.join('、')}</div>
            </div>
          ))}
        </div>
      );
    }
  };

  return (
    <div className="min-h-screen bg-[#050810] text-slate-100 p-4 md:p-8 font-sans">
      
      {/* 登入註冊 Modal */}
      {isAuthModalOpen && (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in">
          <div className="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[2rem] p-8 shadow-2xl relative">
            <button onClick={() => setIsAuthModalOpen(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white"><XIcon size={24} /></button>
            <h2 className="text-2xl font-black italic text-white mb-6">{authForm.isLogin ? '系統登入' : '註冊帳號'}</h2>
            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="text-xs text-slate-400 font-bold uppercase">信箱 (Email)</label>
                <input type="email" required value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 text-white mt-1" />
              </div>
              <div>
                <label className="text-xs text-slate-400 font-bold uppercase">密碼 (Password)</label>
                <input type="password" required minLength="6" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 text-white mt-1" />
              </div>
              {authForm.isLogin && (
                  <div className="text-right mt-2">
                    <span onClick={handleResetPassword} className="text-xs text-blue-400 hover:text-blue-300 font-bold cursor-pointer transition-colors">
                      忘記密碼？
                    </span>
                  </div>
                )}
              {!authForm.isLogin && (
                <div className="slide-from-top">
                  <label className="text-xs text-amber-400 font-bold uppercase">遊戲角色 ID (必填)</label>
                  <input type="text" required placeholder="例如：鹿鹿" value={authForm.gameId} onChange={e => setAuthForm({...authForm, gameId: e.target.value})} className="w-full bg-slate-950 border border-amber-500/50 rounded-xl p-4 outline-none focus:border-amber-500 text-white mt-1" />
                  <p className="text-[10px] text-slate-500 mt-1">此 ID 將綁定您的怨念裝清單，日後可修改。</p>
                </div>
              )}
              <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg mt-4">{authForm.isLogin ? '登入' : '註冊'}</button>
            </form>
            <p className="text-center text-sm text-slate-500 mt-6 cursor-pointer hover:text-blue-400" onClick={() => setAuthForm({...authForm, isLogin: !authForm.isLogin})}>
              {authForm.isLogin ? '沒有帳號？點此註冊' : '已有帳號？點此登入'}
            </p>
          </div>
        </div>
      )}

      {/* 設定 Modal */}
      {isSettingsOpen && (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in">
          <div className="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[2rem] p-6 md:p-8 shadow-2xl relative">
            <button onClick={() => setIsSettingsOpen(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white"><XIcon size={24} /></button>
            <div className="flex items-center gap-3 mb-8">
              <div className="bg-slate-800 p-2.5 rounded-xl text-white"><SettingsIcon size={24} /></div>
              <h2 className="text-2xl font-black italic text-white">系統介面設定</h2>
            </div>
            <div className="space-y-6">
              <div className="space-y-3">
                <label className="text-xs font-black text-slate-400 uppercase tracking-widest">介面與字體大小</label>
                <select value={uiScale} onChange={e => setUiScale(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 text-slate-200">
                  <option value="12px">極小 (75%)</option><option value="14px">小 (87.5%)</option><option value="16px">預設 (100%)</option><option value="18px">大 (112.5%)</option><option value="20px">特大 (125%)</option>
                </select>
              </div>
              <div className="space-y-3">
                <label className="text-xs font-black text-slate-400 uppercase tracking-widest">職業優先級顯示樣式</label>

                  <option value="tags">標籤模式 (各職業獨立顯示)</option><option value="grouped">彙整模式 (依優先度群組顯示)</option>
                </select>
              </div>
            </div>
            <button onClick={() => setIsSettingsOpen(false)} className="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg">確認並關閉</button>
          </div>
        </div>
      )}

      <div className="max-w-6xl mx-auto space-y-6">
        {/* Header */}
        <div className="bg-slate-900/80 border border-slate-800 p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl">
          <div className="flex items-center gap-4 w-full md:w-auto">
            <button onClick={() => setIsSettingsOpen(true)} className="bg-slate-800 p-3 rounded-2xl shadow-lg text-slate-400 hover:text-white hover:bg-slate-700 border border-slate-700 transition-all group">
              <SettingsIcon size={24} className="group-hover:rotate-45 transition-transform duration-300" />
            </button>
            <div className="bg-blue-600 p-3 rounded-2xl"><Trophy size={32} className="text-white" /></div>
            <div>
              <h1 className="text-2xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent italic">ICC 老鼠會</h1>
              <div className="flex items-center gap-2 mt-1">
                <span className="text-slate-500 text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 bg-slate-800 rounded">
                  身分：{userRole === 'admin' ? '系統管理員' : userRole === 'leader' ? '團長' : userRole === 'user' ? '一般用戶' : '訪客'}
                </span>
                {userRole !== 'guest' && (
                  <span className="text-amber-500/80 text-[10px] font-bold flex items-center gap-1 bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20">
                    ID: {userDisplayName || '未設定'}
                    <button onClick={changeMyGameId} className="hover:text-amber-400 ml-1" title="修改遊戲 ID"><EditIcon size={12}/></button>
                  </span>
                )}
              </div>
            </div>
          </div>
          
          <div className="flex gap-2 w-full md:w-auto">
            {user ? (
              <button onClick={handleLogout} className="flex-1 md:flex-none flex justify-center items-center gap-2 px-6 py-2 rounded-xl font-black bg-slate-800 border border-slate-700 text-red-400 hover:bg-red-950/30 transition-all">登出 ({user.email.split('@')[0]})</button>
            ) : (
              <button onClick={() => setIsAuthModalOpen(true)} className="flex-1 md:flex-none flex justify-center items-center gap-2 px-6 py-2 rounded-xl font-black bg-blue-600 text-white hover:bg-blue-500 transition-all"><User size={20}/> 登入 / 註冊</button>
            )}
          </div>
        </div>

        {/* Tabs */}
        <div className="flex bg-slate-900/40 p-1.5 rounded-2xl border border-slate-800 gap-1 overflow-x-auto">
          {[
            { id:'query',    label:'分區查詢', Icon:LayoutGrid, visible: true },
            { 
              id:'record',   
              label: (userRole === 'leader' || userRole === 'admin') ? '掉落登記' : '裝備與PR查詢', 
              Icon: (userRole === 'leader' || userRole === 'admin') ? Plus : Search, 
              visible: true 
            },
            { id:'wishlist', label:'怨念裝登記',Icon:Star, visible: true },
            { id:'history',  label:'分配歷史', Icon:HistoryIcon, visible: true },
            { id:'admin',    label:'後台管理', Icon:ShieldCheck, visible: userRole === 'admin' }
          ].filter(t => t.visible).map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 flex items-center justify-center gap-2 py-3.5 px-4 min-w-[120px] rounded-xl transition-all font-black text-sm ${activeTab===t.id ? 'bg-blue-600 text-white shadow-xl' : 'text-slate-500 hover:bg-slate-800'}`}>
              <t.Icon size={18}/><span>{t.label}</span>
            </button>
          ))}
        </div>

        {/* Main Content Area */}
        <div className="bg-slate-900/50 border border-slate-800 rounded-[2rem] shadow-2xl overflow-hidden min-h-[600px]">

          {/* === Query Tab === */}
          {activeTab === 'query' && (
            <div className="p-6 md:p-8 space-y-8 animate-in">
              <div className="space-y-4">
                <div className="flex items-center gap-2 text-slate-400 text-xs font-black uppercase tracking-widest px-2"><MapIcon size={14}/> 選擇副本區域</div>
                <div className="flex flex-wrap gap-2">
                  {Object.entries(WINGS).map(([id, wing]) => (
                    <button key={id} onClick={() => setSelectedWing(selectedWing===id ? null : id)} className={`px-5 py-2.5 rounded-xl font-black text-xs transition-all border-2 flex items-center gap-2 ${selectedWing===id ? 'bg-blue-600/20 border-blue-500 text-blue-400' : 'bg-slate-800/50 border-slate-700 text-slate-500'}`}>
                      {wing.name} {selectedWing===id ? <ChevronUp size={14}/> : <ChevronDown size={14}/>}
                    </button>
                  ))}
                </div>
              </div>
              <div className="relative">
                <Search className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"/>
                <input type="text" placeholder="搜尋裝備或首領名稱..." className="w-full bg-black/40 border border-slate-800 rounded-2xl py-4 pl-14 pr-6 outline-none focus:border-blue-500/50 text-lg font-medium text-white" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}/>
              </div>
              <div className="space-y-8">
                {selectedWing ? (
                  <div className="space-y-6 slide-from-top">
                    <div className="grid grid-cols-1 gap-6">
                      {groupedData[selectedWing]?.map(boss => (
                        <div key={boss.boss} className="space-y-3">
                          <h3 className="text-sm font-black text-slate-500 px-2 flex items-center gap-2"><div className="w-1 h-1 bg-slate-600 rounded-full"/> {boss.boss}</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {boss.items.map(item => {
                              const wishes = getWishers(item.name);
                              return (
                                <div key={item.name} className="bg-slate-950/40 border border-slate-800 p-5 rounded-2xl relative">
                                  {wishes.length > 0 && <div className="absolute top-4 right-4"><Star size={14} className="text-amber-500" fill="currentColor"/></div>}
                                  <div className="mb-2">
                                  <a 
                                    href={`https://www.wowhead.com/wotlk/item=${item.id || ''}`} 
                                    data-wowhead={`item=${item.id || ''}&domain=tw.wotlk`}
                                    className="text-purple-400 font-black text-lg hover:text-purple-300 transition-colors pointer-events-auto inline-block"
                                    target="_blank" 
                                    rel="noreferrer"
                                  >
                                    {item.name}
                                  </a>
                                </div>
                                  {renderPriorities(item)}
                                  {wishes.length > 0 && <div className="mt-4 pt-3 border-t border-slate-800/50 flex items-center gap-2 text-amber-500 text-[10px] font-bold"><Star size={10} fill="currentColor"/> 怨念：{wishes.join('、')}</div>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center py-20 text-slate-500 border-2 border-dashed border-slate-800 rounded-3xl">
                    <MapIcon size={48} className="opacity-20 mb-4"/>
                    <p className="font-black italic text-lg uppercase">請選擇區域或直接搜尋</p>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* === Record Tab (含點數管理與怨念名單顯示) === */}
          {activeTab === 'record' && (
            <div className="p-8 max-w-4xl mx-auto space-y-10 slide-from-bottom">
              
              <div className="bg-slate-950/40 p-8 rounded-[2rem] border border-slate-800 space-y-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="bg-blue-900/30 p-2 rounded-lg"><Plus className="text-blue-400"/></div>
                  <div>
                    <h2 className="text-2xl font-black italic text-white tracking-tight">
                      {(userRole === 'admin' || userRole === 'leader') ? '掉落登記' : '裝備與PR查詢'}
                    </h2>
                    <p className="text-slate-500 text-xs font-bold uppercase mt-1">
                      {(userRole === 'admin' || userRole === 'leader') ? '登記本次 Boss 掉落 (此處消耗僅做紀錄)' : '查詢裝備優先級與怨念名單'}
                    </p>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                    <label className="text-[10px] font-black text-slate-500 uppercase">選擇 Boss</label>
                    <select className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 text-white" value={dropForm.boss} onChange={e => setDropForm({...dropForm, boss:e.target.value, item:''})}>
                      {ICC_DATA.map(b => <option key={b.boss} value={b.boss}>{b.boss}</option>)}
                    </select>
                  </div>
                  <div className="space-y-2">
                    <label className="text-[10px] font-black text-slate-500 uppercase">裝備</label>
                    <select className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 text-white" value={dropForm.item} onChange={e => setDropForm({...dropForm, item:e.target.value})}>
                      <option value="">選擇品項</option>
                      {getItemsByBoss(dropForm.boss).map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                    </select>
                  </div>
                </div>

                {dropForm.item && (() => {
                  const selectedItemData = getItemsByBoss(dropForm.boss).find(i => i.name === dropForm.item);
                  return (
                    <div className="bg-blue-600/5 border border-blue-500/20 p-6 rounded-2xl animate-in mt-2 mb-4">
                      {/* 裝備詳細連結 */}
                      <div className="mb-4 pb-4 border-b border-blue-500/20">
                        <div className="text-slate-500 font-black text-[10px] uppercase mb-1">已選擇裝備</div>
                        <a 
                          href={`https://www.wowhead.com/wotlk/item=${selectedItemData?.id || ''}`} 
                          data-wowhead={`item=${selectedItemData?.id || ''}&domain=tw.wotlk`}
                          className="text-purple-400 font-black text-xl hover:text-purple-300 transition-colors pointer-events-auto inline-block drop-shadow-md"
                          target="_blank" 
                          rel="noreferrer"
                        >
                          {selectedItemData?.name}
                        </a>
                      </div>

                      <div className="text-blue-400 font-black text-xs uppercase italic tracking-widest mb-3 flex items-center gap-2">
                        <Info size={14}/> 裝備優先參考依據：
                      </div>
                      {renderPriorities(selectedItemData)}
                      
                      {/* 怨念名單顯示 */}
                      {getWishers(dropForm.item).length > 0 && (
                        <div className="mt-5 pt-4 border-t border-blue-500/20 animate-in">
                          <div className="text-amber-500 font-black text-xs uppercase flex items-center gap-2 mb-3 tracking-widest">
                            <Star size={14} fill="currentColor"/> 此裝備的怨念申請名單：
                          </div>
                          <div className="flex flex-wrap gap-3">
                            {getWishers(dropForm.item).map(wName => {
                              const wUser = allUsers.find(u => u.displayName === wName);
                              const pr = wUser ? (wUser.prPoints || 0) : 0;
                              return (
                                <div key={wName} className="bg-amber-950/40 border border-amber-500/30 pl-3 pr-2 py-1.5 rounded-xl flex items-center gap-3 shadow-lg">
                                  <span className="text-amber-200 font-bold text-sm tracking-wide">{wName}</span>
                                  <span className="bg-emerald-900/60 text-emerald-400 text-[11px] font-black px-2 py-1 rounded-lg flex items-center gap-1">
                                    <Gem size={12}/> PR: {pr}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}

                {/* --- 只有管理員/團長才看得到的寫入區塊 --- */}
                {(userRole === 'admin' || userRole === 'leader') && (
                  <>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {/* --- 修改後的得獎者輸入區塊 --- */}
                    <div className="space-y-2 relative"> {/* 這裡加了 relative 方便定位 */}
                      <label className="text-[10px] font-black text-slate-500 uppercase">獲勝團員 ID</label>
                      <input 
                        type="text" 
                        placeholder="輸入 ID (支援關鍵字搜尋)" 
                        className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 text-white" 
                        value={dropForm.winner} 
                        onChange={e => setDropForm({...dropForm, winner:e.target.value})}
                        autoComplete="off"
                      />
                      
                      {/* 關鍵字補全選單 */}
                      {dropForm.winner && !allUsers.find(u => u.displayName === dropForm.winner) && (
                        <div className="absolute z-10 w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl max-h-48 overflow-y-auto">
                          {allUsers
                            .filter(u => u.displayName && u.displayName.toLowerCase().includes(dropForm.winner.toLowerCase()))
                            .map(u => (
                              <div 
                                key={u.id} 
                                className="p-3 hover:bg-blue-600 cursor-pointer text-sm font-bold border-b border-slate-700/50 last:border-0"
                                onClick={() => setDropForm({...dropForm, winner: u.displayName})}
                              >
                                {u.displayName} <span className="text-[10px] opacity-60 ml-2">({u.role})</span>
                              </div>
                            ))
                          }
                        </div>
                      )}
                    </div>
                      <div className="space-y-2">
                        <label className="text-[10px] font-black text-slate-500 uppercase">消耗點數/順位紀錄</label>
                        <input type="text" placeholder="例如: 100" className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 text-white" value={dropForm.points} onChange={e => setDropForm({...dropForm, points:e.target.value})}/>
                      </div>
                    </div>
                    <button onClick={addRecord} disabled={!dropForm.item || !dropForm.winner} className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 text-white font-black py-4 rounded-2xl mt-4">確認登記掉落 (寫入資料庫)</button>
                  </>
                )}
              </div>

              {/* 團隊優先點數 (PR) 列表 */}
              <div className="bg-slate-950/40 p-8 rounded-[2rem] border border-slate-800 space-y-6">
                <div className="flex items-center gap-3 mb-6">
                  <div className="bg-emerald-900/30 p-2 rounded-lg"><Gem className="text-emerald-400"/></div>
                  <div>
                    <h2 className="text-2xl font-black italic text-white tracking-tight">團隊優先點數 (PR)</h2>
                    <p className="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">
                      {(userRole === 'admin' || userRole === 'leader') ? '手動控制團員拿裝優先度' : '查看目前團隊成員的優先點數'}
                    </p>
                  </div>
                </div>
                
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {allUsers.filter(u => u.displayName).sort((a, b) => (b.prPoints || 0) - (a.prPoints || 0) || a.displayName.localeCompare(b.displayName)).map(u => (
                    <div key={u.id} className="bg-slate-900/80 border border-slate-800 p-4 rounded-2xl flex items-center justify-between hover:border-slate-700 transition-colors">
                      <div className="overflow-hidden">
                        <div className="font-black text-blue-400 truncate pr-2">{u.displayName}</div>
                        <div className="text-[10px] text-slate-500 font-bold uppercase">{u.role}</div>
                      </div>
                      <div className="flex items-center gap-2 bg-slate-950 p-1 rounded-xl border border-slate-800 shrink-0">
                        {/* 只有管理員/團長才看得到 -1 按鈕 */}
                        {(userRole === 'admin' || userRole === 'leader') && (
                          <button onClick={() => adjustPoints(u.id, u.prPoints, -1, u.displayName)} className="bg-red-950/40 text-red-400 hover:bg-red-600 hover:text-white w-8 h-8 rounded-lg font-black transition-all flex items-center justify-center">-1</button>
                        )}
                        
                        <span className="font-black text-emerald-400 text-base w-6 text-center">{u.prPoints || 0}</span>
                        
                        {/* 只有管理員/團長才看得到 +1 按鈕 */}
                        {(userRole === 'admin' || userRole === 'leader') && (
                          <button onClick={() => adjustPoints(u.id, u.prPoints, 1, u.displayName)} className="bg-emerald-950/40 text-emerald-400 hover:bg-emerald-600 hover:text-white w-8 h-8 rounded-lg font-black transition-all flex items-center justify-center">+1</button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* === Wishlist Tab === */}
          {activeTab === 'wishlist' && (
            <div className="p-8 space-y-8 animate-in">
              {userRole !== 'guest' ? (
                <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 p-8 rounded-[2.5rem]">
                  <h2 className="text-2xl font-black italic text-white mb-6">個人怨念裝登記 (上限 2 件)</h2>
                  <div className="space-y-6">
                    <div className="space-y-2 max-w-md">
                      <label className="text-[10px] font-black text-slate-500 uppercase flex items-center gap-2">
                        目前的遊戲 ID <span className="text-amber-500/50">(自動綁定，無法手動更改)</span>
                      </label>
                      <input type="text" disabled className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 text-slate-400 font-bold cursor-not-allowed" value={userDisplayName || '尚未設定，請至右上角編輯'}/>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 pt-4">
                      {[{boss:'w1Boss',item:'w1Item',label:'01'},{boss:'w2Boss',item:'w2Item',label:'02'}].map(slot => (
                        <div key={slot.label} className="bg-slate-950/40 p-6 rounded-2xl border border-slate-800 space-y-4">
                          <div className="text-amber-500/80 font-bold text-xs uppercase">怨念位置 {slot.label}</div>
                          <select className="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-white" value={wishForm[slot.boss]} onChange={e => setWishForm({...wishForm, [slot.boss]:e.target.value, [slot.item]:''})}>
                            <option value="">-- 選擇 Boss --</option>
                            {ICC_DATA.map(b => <option key={b.boss} value={b.boss}>{b.boss}</option>)}
                          </select>
                          <select className="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-white" value={wishForm[slot.item]} onChange={e => setWishForm({...wishForm, [slot.item]:e.target.value})} disabled={!wishForm[slot.boss]}>
                            <option value="">-- 選擇裝備 --</option>
                            {getItemsByBoss(wishForm[slot.boss]).map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                          </select>
                        </div>
                      ))}
                    </div>
                    <button onClick={addWish} className="w-full bg-amber-600 hover:bg-amber-500 text-white font-black py-4 rounded-2xl mt-6 tracking-widest">同步上傳怨念清單</button>
                  </div>
                </div>
              ) : (
                <div className="bg-slate-800/30 border border-slate-700 p-8 rounded-2xl text-center text-slate-400 font-bold">請先登入系統才能登記怨念裝備。</div>
              )}

              <div className="relative pt-4">
                <Search className="absolute left-5 top-[60%] -translate-y-1/2 text-slate-500"/>
                <input type="text" placeholder="搜尋團員、裝備或首領名稱..." className="w-full bg-black/40 border border-slate-800 rounded-2xl py-4 pl-14 pr-6 outline-none focus:border-amber-500/50 text-white" value={wishSearchTerm} onChange={e => setWishSearchTerm(e.target.value)}/>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pt-2">
                {wishlists.filter(w => w.name.includes(wishSearchTerm) || w.items.some(it => it.includes(wishSearchTerm) || getBossByItem(it).includes(wishSearchTerm))).map((w) => {
                  const wisherUser = allUsers.find(u => u.displayName === w.name);
                  const prPoints = wisherUser?.prPoints || 0;
                  
                  return (
                    <div key={w.id} className="bg-slate-900/40 border border-slate-800 p-6 rounded-[1.5rem] flex justify-between items-start">
                      <div className="space-y-3 w-full">
                        <div className="font-black text-blue-400 flex items-center gap-2 italic tracking-tight">
                          <div className="w-2 h-2 bg-blue-600 rounded-full"/> {w.name}
                          <span className="ml-2 text-[10px] bg-emerald-900/20 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded-full flex items-center gap-1 font-black">
                            <Gem size={10}/> PR: {prPoints}
                          </span>
                        </div>
                        <div className="space-y-2">
                          {w.items.map(it => {
                            const conflict = isConflict(it);
                            return (
                              <div key={it} className={`text-xs font-bold flex flex-col gap-1.5 italic px-3 py-2.5 rounded-xl border ${conflict ? 'bg-red-950/40 border-red-500/40 text-red-400' : 'bg-amber-500/5 border-amber-500/10 text-amber-500/90'}`}>
                                <div className="flex items-center gap-2"><Star size={12} fill="currentColor" className={conflict ? 'text-red-500' : ''}/><span>{getBossByItem(it)} - {it}</span></div>
                                {conflict && <div className="text-[10px] text-red-500/80 ml-5 font-black bg-red-900/20 w-fit px-2 py-0.5 rounded">⚠️ 衝突：{getWishers(it).filter(n => n !== w.name).join('、')}</div>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      {(userRole === 'admin' || userRole === 'leader' || (user && user.uid === w.userId)) && (
                        <button onClick={() => deleteWishlist(w.id, w.name)} className="text-slate-700 hover:text-red-500 p-2 shrink-0"><Trash2 size={18}/></button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* === History Tab (含多重篩選功能) === */}
          {activeTab === 'history' && (
            <div className="p-8 slide-from-right">
              
              {/* 新增：分配歷史篩選器 */}
              <div className="bg-slate-950/40 border border-slate-800 p-6 rounded-[2rem] mb-6 space-y-4">
                <div className="flex items-center gap-2 text-blue-400 font-black text-xs uppercase tracking-widest">
                  <Filter size={14}/> 篩選分配紀錄
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <input type="text" placeholder="輸入日期 (例: 3/26)" className="bg-slate-900 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500 transition-colors" value={historyFilter.date} onChange={e => setHistoryFilter({...historyFilter, date: e.target.value})} />
                  <input type="text" placeholder="輸入玩家 ID" className="bg-slate-900 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500 transition-colors" value={historyFilter.person} onChange={e => setHistoryFilter({...historyFilter, person: e.target.value})} />
                  
                  <select className="bg-slate-900 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500 transition-colors" value={historyFilter.boss} onChange={e => setHistoryFilter({...historyFilter, boss: e.target.value, item: ''})}>
                    <option value="">-- 所有 Boss --</option>
                    {ICC_DATA.map(b => <option key={b.boss} value={b.boss}>{b.boss}</option>)}
                  </select>
                  
                  <select className="bg-slate-900 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-blue-500 transition-colors" value={historyFilter.item} onChange={e => setHistoryFilter({...historyFilter, item: e.target.value})} disabled={!historyFilter.boss}>
                    <option value="">-- 所有裝備 --</option>
                    {getItemsByBoss(historyFilter.boss).map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                  </select>
                </div>
                
                {/* 如果有填寫任何篩選條件，顯示清除按鈕 */}
                {(historyFilter.date || historyFilter.person || historyFilter.boss || historyFilter.item) && (
                  <button onClick={() => setHistoryFilter({date:'', person:'', boss:'', item:''})} className="text-xs text-red-400 hover:text-white font-bold bg-red-950/30 hover:bg-red-600 px-4 py-2 rounded-lg border border-red-900/50 transition-all">
                    清除篩選條件
                  </button>
                )}
              </div>

              <div className="bg-slate-950/40 border border-slate-800 rounded-[2.5rem] overflow-hidden">
                <table className="w-full text-left">
                  <thead>
                    <tr className="bg-slate-900 border-b border-slate-800 text-slate-500 text-[10px] font-black uppercase tracking-widest">
                      <th className="py-6 px-8">日期</th><th className="py-6">首領與裝備</th><th className="py-6 text-center">得獎者</th><th className="py-6 text-center">點數/備註</th>
                      {(userRole === 'admin' || userRole === 'leader') && <th className="py-6 text-center">操作</th>}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-800/50">
                    {filteredRecords.length === 0 ? (
                      <tr><td colSpan="5" className="py-20 text-center text-slate-500 font-bold">找不到符合條件的紀錄</td></tr>
                    ) : filteredRecords.map(r => (
                      <tr key={r.id} className="hover:bg-white/5">
                        <td className="py-6 px-8 text-slate-500 font-bold text-xs">{r.date.split(',')[0]}</td>
                        <td className="py-6">
                          <div className="text-[10px] font-bold text-slate-600 mb-1">{r.boss}</div>
                          <div className="text-purple-400 font-black text-lg">{r.item}</div>
                          {r.isWish && (
                            <span className="bg-amber-500/20 text-amber-500 text-[10px] px-2 py-0.5 rounded border border-amber-500/30 font-black">
                              ★ 怨念
                            </span>
                          )}
                        </td>
                        <td className="py-6 text-center font-black text-blue-400 text-lg">{r.winner}</td>
                        <td className="py-6 text-center"><span className="bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-full text-xs font-black text-slate-300">{r.points}</span></td>
                        {(userRole === 'admin' || userRole === 'leader') && (
                          <td className="py-6 text-center"><button onClick={() => deleteRecord(r.id, r.item)} className="text-slate-700 hover:text-red-500"><Trash2 size={18}/></button></td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* === Admin Tab === */}
          {activeTab === 'admin' && userRole === 'admin' && (
            <div className="p-8 space-y-6 slide-from-right">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-black italic text-white flex items-center gap-2"><ShieldCheck className="text-amber-500"/> 後台管理中心</h2>
                <div className="flex bg-slate-900 border border-slate-800 rounded-lg p-1">
                  <button onClick={() => setAdminTab('users')} className={`px-4 py-2 rounded font-bold text-sm ${adminTab === 'users' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>用戶權限</button>
                  <button onClick={() => setAdminTab('logs')} className={`px-4 py-2 rounded font-bold text-sm ${adminTab === 'logs' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>系統日誌</button>
                </div>
              </div>

              {adminTab === 'users' ? (
                <div className="bg-slate-950/40 border border-slate-800 rounded-2xl overflow-hidden animate-in">
                  <table className="w-full text-left text-sm text-slate-300">
                    <thead className="bg-slate-900 border-b border-slate-800">
                      <tr><th className="p-4 font-bold">Email</th><th className="p-4 font-bold">遊戲 ID</th><th className="p-4 font-bold">目前身分</th><th className="p-4 font-bold">操作</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800/50">
                      {allUsers.map(u => (
                        <tr key={u.id} className="hover:bg-slate-900/50">
                          <td className="p-4">{u.email}</td>
                          <td className="p-4">
                            <input type="text" className="bg-transparent border-b border-slate-700 outline-none focus:border-blue-500 text-amber-400 w-32" 
                              value={u.displayName || ''} 
                              onChange={(e) => {
                                const newUsers = [...allUsers];
                                const index = newUsers.findIndex(x => x.id === u.id);
                                newUsers[index].displayName = e.target.value;
                                setAllUsers(newUsers);
                              }}
                              onBlur={(e) => adminUpdateUser(u.id, 'displayName', e.target.value, u.email)}
                            />
                          </td>
                          <td className="p-4 font-bold">{u.role === 'admin' ? <span className="text-amber-500">管理員</span> : u.role === 'leader' ? <span className="text-blue-400">團長</span> : '普通用戶'}</td>
                          <td className="p-4">
                            <select className="bg-slate-800 border border-slate-700 rounded p-1 outline-none text-white" value={u.role} onChange={(e) => adminUpdateUser(u.id, 'role', e.target.value, u.email)} disabled={u.id === user.uid}>
                              <option value="user">普通用戶</option><option value="leader">團長</option><option value="admin">管理員</option>
                            </select>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div className="bg-slate-950/40 border border-slate-800 rounded-2xl overflow-hidden animate-in">
                  <div className="p-4 border-b border-slate-800 bg-slate-900 flex gap-4">
                    <span className="text-slate-400 text-sm font-bold flex items-center">篩選日誌類型：</span>
                    <select value={logFilter} onChange={e => setLogFilter(e.target.value)} className="bg-slate-800 border border-slate-700 rounded p-1 text-sm text-white outline-none">
                      <option value="ALL">全部 (All)</option>
                      <option value="AUTH">登入註冊 (Auth)</option>
                      <option value="RECORD">裝備分配 (Record)</option>
                      <option value="WISH">怨念變更 (Wish)</option>
                      <option value="USER">玩家設定 (User)</option>
                      <option value="ADMIN">管理員操作 (Admin)</option>
                    </select>
                  </div>
                  <div className="max-h-[500px] overflow-y-auto">
                    <table className="w-full text-left text-xs text-slate-300">
                      <thead className="bg-slate-900 border-b border-slate-800 sticky top-0">
                        <tr><th className="p-4">時間</th><th className="p-4">類型</th><th className="p-4">操作帳號</th><th className="p-4">詳細動作</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800/50">
                        {systemLogs.filter(log => logFilter === 'ALL' || log.type === logFilter).map(log => (
                          <tr key={log.id} className="hover:bg-slate-900/50">
                            <td className="p-4 whitespace-nowrap text-slate-500">{log.date}</td>
                            <td className="p-4">
                              <span className={`px-2 py-1 rounded font-bold ${log.type === 'AUTH' ? 'bg-purple-900/50 text-purple-300' : log.type === 'RECORD' ? 'bg-blue-900/50 text-blue-300' : log.type === 'WISH' ? 'bg-amber-900/50 text-amber-300' : log.type === 'ADMIN' ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-300'}`}>
                                {log.type}
                              </span>
                            </td>
                            <td className="p-4">{log.userEmail}</td>
                            <td className="p-4 font-bold text-slate-200">{log.details}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}

        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
