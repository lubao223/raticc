                          </h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {boss.items.map(item => {
                              const wishes = getWishers(item.name);
                              return (
                                <div key={item.name} className="bg-slate-950/40 border border-slate-800 p-5 rounded-2xl hover:border-slate-600 transition-all relative">
                                  {wishes.length > 0 && (
                                    <div className="absolute top-4 right-4"><Star size={14} className="text-amber-500" fill="currentColor"/></div>
                                  )}
                                  <div className="text-purple-400 font-black text-base mb-3">{item.name}</div>
                                  <div className="flex flex-wrap gap-1.5">
                                    {Object.entries(item.priorities).sort((a,b)=>a[1]-b[1]).map(([spec,prio]) => (
                                      <span key={spec} className={`text-[10px] px-2.5 py-1 rounded-lg font-black border ${prio===1 ? 'bg-blue-600/20 border-blue-500/30 text-blue-300' : prio===2 ? 'bg-slate-800 border-slate-700 text-slate-300' : 'bg-slate-900 border-slate-800 text-slate-500'}`}>
                                        {spec}: {prio}
                                      </span>
                                    ))}
                                  </div>
                                  {wishes.length > 0 && (
                                    <div className="mt-3 pt-3 border-t border-slate-800/50 flex items-center gap-2 text-amber-500 text-[10px] font-bold">
                                      <Star size={10} fill="currentColor"/> 怨念：{wishes.join('、')}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center py-20 text-slate-500 space-y-4 border-2 border-dashed border-slate-800 rounded-3xl">
                    <MapIcon size={48} className="opacity-20"/>
                    <div className="text-center">
                      <p className="font-black italic text-lg tracking-tight uppercase">請點選上方按鈕選擇副本地區</p>
                      <p className="text-xs font-bold opacity-50">或是使用搜尋框直接查找全區域裝備</p>
                    </div>
                  </div>
                )}

                {searchTerm && !selectedWing && (
                  <div className="space-y-6">
                    <div className="flex items-center gap-2 text-blue-400 font-black text-xs uppercase tracking-widest italic">
                      <Filter size={14}/> 搜尋結果：
                    </div>
                    {Object.entries(groupedData).map(([wingName, entries]) => (
                      <div key={wingName} className="space-y-4">
                        <div className="text-xs font-black text-slate-600 bg-slate-800/50 w-max px-3 py-1 rounded-full uppercase">{WINGS[wingName].name}</div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {entries.flatMap(boss => boss.items.map(item => (
                            <div key={item.name} className="bg-slate-950/40 border border-slate-800 p-4 rounded-xl flex justify-between items-center">
                              <div>
                                <div className="text-[10px] text-slate-600 font-bold uppercase">{boss.boss}</div>
                                <div className="text-purple-400 font-bold">{item.name}</div>
                              </div>
                              <div className="flex items-center gap-2">
                                {Object.entries(item.priorities).slice(0,1).map(([spec,prio]) => (
                                  <span key={spec} className="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">{spec}({prio})</span>
                                ))}
                              </div>
                            </div>
                          )))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Record Tab */}
          {activeTab === 'record' && isAdmin && (
            <div className="p-8 max-w-2xl mx-auto space-y-8 slide-from-bottom">
              <div className="text-center">
                <h2 className="text-2xl font-black text-white italic">掉落登記管理</h2>
                <p className="text-slate-500 text-sm font-bold uppercase tracking-widest mt-1">登記本次 Boss 掉落與分配點數</p>
              </div>
              <div className="bg-slate-950/40 p-8 rounded-[2rem] border border-slate-800 space-y-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">選擇 Boss</label>
                    <select className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 outline-none focus:border-blue-500 transition-all font-bold"
                      value={dropForm.boss} onChange={e => setDropForm({...dropForm, boss:e.target.value, item:''})}>
                      {ICC_DATA.map(b => <option key={b.boss} value={b.boss}>{b.boss}</option>)}
                    </select>
                  </div>
                  <div className="space-y-2">
                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">掉落裝備</label>
                    <select className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 outline-none focus:border-blue-500 transition-all font-bold"
                      value={dropForm.item} onChange={e => setDropForm({...dropForm, item:e.target.value})}>
                      <option value="">選擇品項</option>
                      {getItemsByBoss(dropForm.boss).map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                    </select>
                  </div>
                </div>

                {dropForm.item && (
                  <div className="bg-blue-600/5 border border-blue-500/20 p-6 rounded-2xl zoom-in">
                    <div className="text-blue-400 font-black text-xs uppercase italic tracking-widest mb-3 flex items-center gap-2">
                      <Info size={14}/> 分配參考依據：
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {Object.entries(getItemsByBoss(dropForm.boss).find(i=>i.name===dropForm.item)?.priorities||{})
                        .sort((a,b)=>a[1]-b[1]).map(([s,p]) => (
                          <span key={s} className="bg-slate-900 text-[11px] px-3 py-1.5 rounded-lg border border-slate-800 font-bold">
                            {s}: <b className="text-blue-400">{p}</b>
                          </span>
                        ))}
                    </div>
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">獲勝團員 ID</label>
                    <input type="text" placeholder="輸入 ID"
                      className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 outline-none focus:border-blue-500 transition-all font-bold"
                      value={dropForm.winner} onChange={e => setDropForm({...dropForm, winner:e.target.value})}/>
                  </div>
                  <div className="space-y-2">
                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">消耗點數</label>
                    <input type="number" placeholder="0"
                      className="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 outline-none focus:border-blue-500 transition-all font-bold"
                      value={dropForm.points} onChange={e => setDropForm({...dropForm, points:e.target.value})}/>
                  </div>
                </div>

                <button onClick={addRecord} disabled={!dropForm.item || !dropForm.winner}
                  className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-[0.98] mt-4 italic tracking-widest">
                  確認登記掉落
                </button>
              </div>
            </div>
          )}

          {/* Wishlist Tab */}
          {activeTab === 'wishlist' && (
            <div className="p-8 space-y-8 animate-in">
              <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div className="absolute top-0 right-0 p-8 opacity-5"><Star size={120}/></div>
                <div className="flex items-center gap-4 mb-8">
                  <Star className="text-amber-500" fill="currentColor"/>
                  <h2 className="text-2xl font-black italic text-white tracking-tight">個人怨念裝登記 (上限 2 件)</h2>
                </div>
                <div className="space-y-6">
                  <div className="space-y-2 max-w-md">
                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">您的團員 ID</label>
                    <input type="text" placeholder="例如：法斯"
                      className="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 outline-none focus:border-amber-500 transition-all font-bold"
                      value={wishForm.playerName} onChange={e => setWishForm({...wishForm, playerName:e.target.value})}/>
                  </div>
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 pt-4">
                    {[{boss:'w1Boss',item:'w1Item',label:'01'},{boss:'w2Boss',item:'w2Item',label:'02'}].map(slot => (
                      <div key={slot.label} className="bg-slate-950/40 p-6 rounded-2xl border border-slate-800 space-y-4">
                        <div className="flex items-center gap-2 text-amber-500/80 font-bold text-xs uppercase tracking-wider">
                          <div className="w-1.5 h-1.5 bg-amber-500 rounded-full"/> 怨念位置 {slot.label}
                        </div>
                        <div className="grid grid-cols-1 gap-4">
                          <select className="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 outline-none focus:border-amber-500 transition-all text-sm font-bold"
                            value={wishForm[slot.boss]} onChange={e => setWishForm({...wishForm, [slot.boss]:e.target.value, [slot.item]:''})}>
                            <option value="">-- 選擇 Boss --</option>
                            {ICC_DATA.map(b => <option key={b.boss} value={b.boss}>{b.boss}</option>)}
                          </select>
                          <select className="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 outline-none focus:border-amber-500 transition-all text-sm font-bold"
                            value={wishForm[slot.item]} onChange={e => setWishForm({...wishForm, [slot.item]:e.target.value})} disabled={!wishForm[slot.boss]}>
                            <option value="">-- 選擇裝備 --</option>
                            {getItemsByBoss(wishForm[slot.boss]).map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                          </select>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={addWish}
                    className="w-full bg-amber-600 hover:bg-amber-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-[0.98] mt-6 tracking-widest italic">
                    確認提交怨念清單
                  </button>
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pt-4">
                {wishlists.map((w,i) => (
                  <div key={i} className="bg-slate-900/40 border border-slate-800 p-6 rounded-[1.5rem] flex justify-between items-center hover:border-slate-600 transition-all">
                    <div className="space-y-3">
                      <div className="font-black text-blue-400 flex items-center gap-2 italic tracking-tight">
                        <div className="w-2 h-2 bg-blue-600 rounded-full"/> {w.name}
                      </div>
                      <div className="space-y-2">
                        {w.items.map(it => (
                          <div key={it} className="text-xs text-amber-500/90 font-bold flex items-center gap-2 italic bg-amber-500/5 px-2 py-1 rounded-lg border border-amber-500/10">
                            <Star size={12} fill="currentColor"/> {it}
                          </div>
                        ))}
                      </div>
                    </div>
                    {isAdmin && (
                      <button onClick={() => setWishlists(wishlists.filter((_,idx)=>idx!==i))} className="text-slate-700 hover:text-red-500 transition-colors p-2">
                        <Trash2 size={18}/>
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* History Tab */}
          {activeTab === 'history' && (
            <div className="p-8 slide-from-right">
              <div className="bg-slate-950/40 border border-slate-800 rounded-[2.5rem] overflow-hidden">
                <table className="w-full text-left">
                  <thead>
                    <tr className="bg-slate-900 border-b border-slate-800 text-slate-500 text-[10px] font-black uppercase tracking-widest">
                      <th className="py-6 px-8">日期</th>
                      <th className="py-6">首領與裝備</th>
                      <th className="py-6 text-center">得獎者</th>
                      <th className="py-6 text-center">點數</th>
                      {isAdmin && <th className="py-6 text-center">操作</th>}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-800/50">
                    {records.length === 0 ? (
                      <tr><td colSpan="5" className="py-32 text-center text-slate-600 italic font-black uppercase text-xs tracking-[0.2em]">目前無任何分配紀錄數據</td></tr>
                    ) : records.map(r => (
                      <tr key={r.id} className="hover:bg-white/5 transition-colors">
                        <td className="py-6 px-8 text-slate-500 font-bold text-xs">{r.date.split(',')[0]}</td>
                        <td className="py-6">
                          <div className="text-[10px] font-bold text-slate-600 mb-1 flex items-center gap-1">
                            <ChevronRight size={10} className="text-blue-500"/> {r.boss}
                          </div>
                          <div className="text-purple-400 font-black text-lg">{r.item}</div>
                        </td>
                        <td className="py-6">
                          <div className="flex flex-col items-center">
                            <span className="font-black text-blue-400 flex items-center gap-1 italic text-lg tracking-tight">
                              {r.winner}
                              {getWishers(r.item).includes(r.winner) && <Star size={14} className="text-amber-500" fill="currentColor"/>}
                            </span>
                          </div>
                        </td>
                        <td className="py-6 text-center">
                          <span className="bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-full text-xs font-black text-slate-300">{r.points}</span>
                        </td>
                        {isAdmin && (
                          <td className="py-6 text-center">
                            <button onClick={() => setRecords(records.filter(x=>x.id!==r.id))} className="text-slate-700 hover:text-red-500 transition-all p-2 rounded-xl">
                              <Trash2 size={18}/>
                            </button>
                          </td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="bg-slate-900/30 border border-slate-800 p-6 rounded-3xl flex flex-wrap justify-between items-center gap-4 text-slate-500 text-[10px] font-black uppercase tracking-widest italic">
          <div className="flex items-center gap-2"><Filter size={14} className="text-blue-500"/> 瀏覽器本地數據模式</div>
          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-600 rounded-full"/> 分配總數: {records.length}</div>
            <div className="flex items-center gap-2"><div className="w-2 h-2 bg-amber-500 rounded-full"/> 怨念紀錄: {wishlists.length}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
